<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Payment</title>

<style>

body{
    font-family:Arial,sans-serif;
    background:#fff5e6;
    text-align:center;
    padding:20px;
}

.box{
    background:white;
    max-width:420px;
    margin:auto;
    padding:20px;
    border-radius:12px;
    box-shadow:0 0 10px rgba(0,0,0,0.12);
}

img{
    width:250px;
    max-width:100%;
    border-radius:10px;
}

.amount{
    color:#cc0000;
    font-size:28px;
    font-weight:bold;
    margin:15px 0;
}

button{
    width:100%;
    padding:14px;
    background:#ff6600;
    color:white;
    border:none;
    border-radius:8px;
    font-size:16px;
    margin-top:15px;
    cursor:pointer;
}

button:hover{
    background:#e65c00;
}

.upload-box{
    margin-top:20px;
    text-align:center;
}

.upload-box p{
    font-weight:bold;
    margin-bottom:10px;
    color:#333;
}

#paymentSlip{
    width:100%;
    max-width:300px;
    padding:12px;
    border:2px dashed #ff6600;
    border-radius:10px;
    background:#fff;
    cursor:pointer;
    display:block;
    margin:auto;
    text-align:center;
}

</style>
</head>

<body>

<div class="box">

<h2>Complete Payment</h2>

<p>Please scan QR code and complete payment</p>

<img src="upi-qr-1.jpeg">

<div class="upload-box">
    <p>Upload Payment Screenshot</p>
    <input type="file" id="paymentSlip" accept="image/*">
</div>

<div class="amount">
₹ <span id="amount"></span>
</div>

<p>After payment click below button</p>

<button id="payBtn" onclick="paymentDone()">
I Have Paid
</button>

</div>

<script>

/* ================= SHOW PRICE ================= */

document.getElementById("amount").innerText =
localStorage.getItem("temp_price") ||
localStorage.getItem("learning_price") ||
"";

/* ================= PAYMENT ================= */

function paymentDone(){

    let btn = document.getElementById("payBtn");

    btn.disabled = true;
    btn.innerText = "Processing...";

    let file =
    document.getElementById("paymentSlip").files[0];

    if(!file){

        alert("Please upload payment screenshot");

        btn.disabled = false;
        btn.innerText = "I Have Paid";

        return;
    }

    /* ================= TYPE ================= */

    let type =
    localStorage.getItem("temp_type");

    /* LEARNING FALLBACK */
    if(!type &&
       localStorage.getItem("temp_course")){

        type = "learning";
    }

    let payload = {};

    /* ================= POOJA ================= */

    if(type === "pooja"){

        payload = {

            type:"pooja",

            poojaType:
            localStorage.getItem("temp_pooja"),

            price:
            localStorage.getItem("temp_price"),

            gothram:
            localStorage.getItem("temp_gothram"),

            name1:
            localStorage.getItem("temp_name1"),

            name2:
            localStorage.getItem("temp_name2"),

            name3:
            localStorage.getItem("temp_name3"),

            name4:
            localStorage.getItem("temp_name4"),

            name5:
            localStorage.getItem("temp_name5"),

            wish:
            localStorage.getItem("temp_wish"),

            phone:
            localStorage.getItem("temp_phone"),

            email:
            localStorage.getItem("temp_email")
        };
    }

    /* ================= ASTROLOGY ================= */

    else if(type === "astrology"){

        payload = {

            type:"astrology",

            service:
            localStorage.getItem("temp_service"),

            price:
            localStorage.getItem("temp_price"),

            consultDate:
            localStorage.getItem("temp_consultDate"),

            consultSlot:
            localStorage.getItem("temp_consultSlot"),

            name1:
            localStorage.getItem("temp_name1"),

            dob1:
            localStorage.getItem("temp_dob1"),

            tob1:
            localStorage.getItem("temp_tob1"),

            pob1:
            localStorage.getItem("temp_pob1"),

            name2:
            localStorage.getItem("temp_name2"),

            dob2:
            localStorage.getItem("temp_dob2"),

            tob2:
            localStorage.getItem("temp_tob2"),

            pob2:
            localStorage.getItem("temp_pob2"),

            reason:
            localStorage.getItem("temp_reason"),

            phone:
            localStorage.getItem("temp_phone"),

            email:
            localStorage.getItem("temp_email")
        };
    }

    /* ================= MUHURTHAM ================= */

    else if(type === "muhurtha" ||
            type === "muhurtham"){

        payload = {

            type:"muhurtham",

            service:
            localStorage.getItem("temp_muhurtham_type"),

            price:
            localStorage.getItem("temp_price"),

            name1:
            localStorage.getItem("temp_name1"),

            nak1:
            localStorage.getItem("temp_nak1"),

            name2:
            localStorage.getItem("temp_name2"),

            nak2:
            localStorage.getItem("temp_nak2"),

            event:
            localStorage.getItem("temp_event"),

            requirement:
            localStorage.getItem("temp_requirement"),

            phone:
            localStorage.getItem("temp_phone"),

            email:
            localStorage.getItem("temp_email")
        };
    }

    /* ================= PRODUCT ================= */

    else if(type === "product"){

        payload = {

            type:"product",

            product:
            localStorage.getItem("temp_product"),

            price:
            localStorage.getItem("temp_price"),

            qty:
            localStorage.getItem("temp_qty"),

            name:
            localStorage.getItem("temp_name"),

            phone:
            localStorage.getItem("temp_phone"),

            email:
            localStorage.getItem("temp_email"),

            address:
            localStorage.getItem("temp_address"),

            state:
            localStorage.getItem("temp_state"),

            pincode:
            localStorage.getItem("temp_pincode"),

            /* DIGITAL PRODUCT SUPPORT */

            digital:
            localStorage.getItem("temp_digital") || "false",

            file:
            localStorage.getItem("temp_file") || ""
        };
    }

    /* ================= LEARNING ================= */

    else if(type === "learning"){

        payload = {

            type:"learning",

            course:
            localStorage.getItem("temp_course"),

            price:
            localStorage.getItem("temp_price"),

            name:
            localStorage.getItem("temp_name"),

            phone:
            localStorage.getItem("temp_phone"),

            email:
            localStorage.getItem("temp_email"),

            city:
            localStorage.getItem("temp_city"),

            age:
            localStorage.getItem("temp_age"),

            notes:
            localStorage.getItem("temp_notes")
        };
    }

    else{

        alert("Booking data missing");

        btn.disabled = false;
        btn.innerText = "I Have Paid";

        return;
    }

    /* ================= API ================= */

    fetch(
    "https://script.google.com/macros/s/AKfycbzHLwOjhVzobZFSdCQgqwA4wUhtmQx7A1IazE68X_Ha7PLptniscj0P0vFXSg10CR4/exec",
    {
        method:"POST",
        body:JSON.stringify(payload)
    })

    .then(res => res.text())

    .then(text => {

        let response = JSON.parse(text);

        let id =
        response.bookingId ||
        response.orderId;

        if(!id){

            alert("Booking saved but ID missing");

            btn.disabled = false;
            btn.innerText = "I Have Paid";

            return;
        }

        let message = "";

        /* ================= SUCCESS MESSAGES ================= */

        if(type === "pooja"){

            message =
            "🪔 Jai Shree Ram 🙏\n\n" +
            "Pooja Booking Confirmed\n" +
            "Booking ID: " + id + "\n\n" +
            "We will perform your pooja with full devotion.\n" +
            "You will receive further updates soon.\n\n" +
            "Har Har Mahadev 🔱";
        }

        else if(type === "astrology"){

            message =
            "🔯 Jai Shree Ram 🙏\n\n" +
            "Astrology Consultation Booked\n" +
            "Booking ID: " + id + "\n\n" +
            "Our astrologer will contact you soon with guidance.\n\n" +
            "Har Har Mahadev 🔱";
        }

        else if(type === "muhurtham"){

            message =
            "📅 Jai Shree Ram 🙏\n\n" +
            "Muhurtham Booking Confirmed\n" +
            "Booking ID: " + id + "\n\n" +
            "We will help you select the most auspicious timing.\n\n" +
            "Har Har Mahadev 🔱";
        }

        else if(type === "product"){

            message =
            "🛍️ Jai Shree Ram 🙏\n\n" +
            "Product Order Placed Successfully\n" +
            "Order ID: " + id + "\n\n" +
            "Your spiritual product will be packed and shipped soon.\n\n" +
            "Har Har Mahadev 🔱";
        }

        else if(type === "learning"){

            message =
            "📚 Jai Shree Ram 🙏\n\n" +
            "Learning Program Enrolled Successfully\n" +
            "Registration ID: " + id + "\n\n" +
            "Welcome to your spiritual learning journey.\n" +
            "We will contact you with class details soon.\n\n" +
            "Har Har Mahadev 🔱";
        }

        else{

            message =
            "🙏 Jai Shree Ram\n\n" +
            "Booking Successful\n" +
            "ID: " + id + "\n\n" +
            "Thank you for choosing Pendyala Divine Services.";
        }

        alert(message);

        /* ================= DIGITAL DOWNLOAD REDIRECT ================= */

        if(type === "product"){

            let isDigital =
            localStorage.getItem("temp_digital");

            let file =
            localStorage.getItem("temp_file");

            if(isDigital === "true" && file){

                localStorage.setItem(
                    "download_file",
                    file
                );

                setTimeout(()=>{

                    window.location.href =
                    "download.html";

                }, 800);

                return;
            }
        }

        /* ================= NORMAL REDIRECT ================= */

        localStorage.clear();

        window.location.href =
        "index.html";
    })

    .catch(err => {

        console.error(err);

        alert("Error saving booking");

        btn.disabled = false;
        btn.innerText = "I Have Paid";
    });
}

</script>

</body>
</html>
