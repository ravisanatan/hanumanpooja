<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Payment</title>

<style>

body{
    font-family:Arial,sans-serif;
    background:#fff5e6;
    text-align:center;
    padding:20px;
}

.box{
    background:white;
    max-width:420px;
    margin:auto;
    padding:20px;
    border-radius:12px;
    box-shadow:0 0 10px rgba(0,0,0,0.12);
}

img{
    width:250px;
    max-width:100%;
    border-radius:10px;
}

.amount{
    color:#cc0000;
    font-size:28px;
    font-weight:bold;
    margin:15px 0;
}

button{
    width:100%;
    padding:14px;
    background:#ff6600;a
    color:white;
    border:none;
    border-radius:8px;
    font-size:16px;
    margin-top:15px;
    cursor:pointer;
}

button:hover{
    background:#e65c00;
}

.upload-box{
    margin-top:20px;
    text-align:center;
}

.upload-box p{
    font-weight:bold;
    margin-bottom:10px;
    color:#333;
}

/* FILE INPUT STYLING */
#paymentSlip{
    width:100%;
    max-width:300px;
    padding:12px;
    border:2px dashed #ff6600;
    border-radius:10px;
    background:#fff;
    cursor:pointer;
    text-align:center;
    display:block;
    margin:auto;
}
    
</style>
</head>

<body>

<div class="box">

<h2>Complete Payment</h2>

<p>Please scan QR code and complete payment</p>

<img src="upi-qr-1.jpeg">

<div class="upload-box">
    <p>Upload Payment Screenshot</p>

    <input
        type="file"
        id="paymentSlip"
        accept="image/*">
</div>
    
<div class="amount">
₹ <span id="amount"></span>
</div>

<p>
After payment click below button
</p>

<button id="payBtn" onclick="paymentDone()">
I Have Paid
</button>

</div>

<script>

// SHOW AMOUNT

document.getElementById("amount").innerText =

localStorage.getItem("temp_price") ||

localStorage.getItem("learning_price") ||

"";

// PAYMENT SUBMIT

function paymentDone(){

    let btn =
    document.getElementById("payBtn");

    // STOP DOUBLE CLICK
    btn.disabled = true;

    btn.innerText = "Processing...";

    let fileInput =
    document.getElementById("paymentSlip");

    let file = fileInput.files[0];

    if(!file){

        alert("Please upload payment screenshot");

        btn.disabled = false;

        btn.innerText = "I Have Paid";

        return;
    }
    let type =

    localStorage.getItem("temp_type");

    let payload = {};

    // ================= POOJA =================

    if(type == "pooja"){

        payload = {

            type:"pooja",

            poojaType:
            localStorage.getItem("temp_pooja"),

            price:
            localStorage.getItem("temp_price"),

            gothram:
            localStorage.getItem("temp_gothram"),

            name1:
            localStorage.getItem("temp_name1"),

            name2:
            localStorage.getItem("temp_name2"),

            name3:
            localStorage.getItem("temp_name3"),

            name4:
            localStorage.getItem("temp_name4"),

            name5:
            localStorage.getItem("temp_name5"),

            wish:
            localStorage.getItem("temp_wish"),

            phone:
            localStorage.getItem("temp_phone"),

            email:
            localStorage.getItem("temp_email")
        };

    }

    // ================= ASTROLOGY =================

    else if(type == "astrology"){

        payload = {

            type:"astrology",

            service:
            localStorage.getItem("temp_service"),

            price:
            localStorage.getItem("temp_price"),

            name1:
            localStorage.getItem("temp_name1"),

            dob1:
            localStorage.getItem("temp_dob1"),

            tob1:
            localStorage.getItem("temp_tob1"),

            pob1:
            localStorage.getItem("temp_pob1"),

            name2:
            localStorage.getItem("temp_name2"),

            dob2:
            localStorage.getItem("temp_dob2"),

            tob2:
            localStorage.getItem("temp_tob2"),

            pob2:
            localStorage.getItem("temp_pob2"),

            reason:
            localStorage.getItem("temp_reason"),

            phone:
            localStorage.getItem("temp_phone"),

            email:
            localStorage.getItem("temp_email")
        };

    }

    // ================= MUHURTHAM =================

    else if(type == "muhurtham"){

        payload = {

            type:"muhurtham",

            service:
            localStorage.getItem("temp_muhurtham_type"),

            price:
            localStorage.getItem("temp_price"),

            name1:
            localStorage.getItem("temp_name1"),

            nak1:
            localStorage.getItem("temp_nak1"),

            name2:
            localStorage.getItem("temp_name2"),

            nak2:
            localStorage.getItem("temp_nak2"),

            event:
            localStorage.getItem("temp_event"),

            requirement:
            localStorage.getItem("temp_requirement"),

            phone:
            localStorage.getItem("temp_phone"),

            email:
            localStorage.getItem("temp_email")
        };

    }

    // ================= PRODUCT =================

    else if(type == "product"){

        payload = {

            type:"product",

            product:
            localStorage.getItem("temp_product"),

            price:
            localStorage.getItem("temp_price"),

            qty:
            localStorage.getItem("temp_qty"),

            name:
            localStorage.getItem("temp_name"),

            phone:
            localStorage.getItem("temp_phone"),

            email:
            localStorage.getItem("temp_email"),

            address:
            localStorage.getItem("temp_address")
        };

    }

    // ================= LEARNING =================

    else{

        payload = {

            type:"learning",

            course:
            localStorage.getItem("learning_course"),

            price:
            localStorage.getItem("learning_price"),

            name:
            localStorage.getItem("learning_name"),

            phone:
            localStorage.getItem("learning_phone"),

            email:
            localStorage.getItem("learning_email"),

            city:
            localStorage.getItem("learning_city"),

            age:
            localStorage.getItem("learning_age"),

            notes:
            localStorage.getItem("learning_notes")
        };

    }

    // API CALL

    fetch(
"https://script.google.com/macros/s/AKfycbzHLwOjhVzobZFSdCQgqwA4wUhtmQx7A1IazE68X_Ha7PLptniscj0P0vFXSg10CR4/exec",
{
    method: "POST",
    body: JSON.stringify(payload)
}
)
.then(res => res.text())
.then(text => {

    let response = JSON.parse(text);

    let id = response.bookingId || response.orderId;

    alert("Booking Successful!\nID: " + id);

    localStorage.clear();

    window.location.href = "index.html";

})
.catch(err => {

    console.error(err);

    alert("Error saving booking. Please try again.");

    btn.disabled = false;
    btn.innerText = "I Have Paid";

});
}

</script>

</body>
</html>
