<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#fff5e6;
    text-align:center;
    padding:20px;
}

.box{
    background:white;
    max-width:420px;
    margin:auto;
    padding:20px;
    border-radius:12px;
    box-shadow:0 0 10px rgba(0,0,0,0.12);
}

img{
    width:250px;
    max-width:100%;
    border-radius:10px;
}

.amount{
    color:#cc0000;
    font-size:28px;
    font-weight:bold;
    margin:15px 0;
}

button{
    width:100%;
    padding:14px;
    background:#ff6600;
    color:white;
    border:none;
    border-radius:8px;
    font-size:16px;
    margin-top:15px;
    cursor:pointer;
}

button:hover{
    background:#e65c00;
}

#paymentSlip{
    width:100%;
    max-width:300px;
    padding:12px;
    border:2px dashed #ff6600;
    border-radius:10px;
    background:#fff;
    margin:auto;
    display:block;
}
</style>
</head>

<body>

<div class="box">

<h2>Complete Payment</h2>

<p>Scan QR and pay</p>

<img src="upi-qr-1.jpeg">

<div class="amount">
₹ <span id="amount">0</span>
</div>

<input type="file" id="paymentSlip" accept="image/*">

<button id="payBtn" onclick="paymentDone()">
I Have Paid
</button>

</div>

<script>

/* ================= LOAD DATA ================= */

let type = localStorage.getItem("temp_type");

let product = localStorage.getItem("temp_product");
let qty = parseInt(localStorage.getItem("temp_qty") || 1);
let price = parseFloat(localStorage.getItem("temp_price") || 0);

let total = qty * price;

/* SHOW AMOUNT */
document.getElementById("amount").innerText = total;

/* ================= PAYMENT FUNCTION ================= */

function paymentDone(){

    let btn = document.getElementById("payBtn");

    btn.disabled = true;
    btn.innerText = "Processing...";

    let file = document.getElementById("paymentSlip").files[0];

    if(!file){
        alert("Upload payment screenshot");
        btn.disabled = false;
        btn.innerText = "I Have Paid";
        return;
    }

    let payload = {
        type: type,
        product: product,
        qty: qty,
        price: price,
        total: total,

        name: localStorage.getItem("temp_name"),
        phone: localStorage.getItem("temp_phone"),
        email: localStorage.getItem("temp_email"),

        address: localStorage.getItem("temp_address"),
        state: localStorage.getItem("temp_state"),
        pincode: localStorage.getItem("temp_pincode"),

        digital: localStorage.getItem("temp_digital") === "true",
        file: localStorage.getItem("temp_file") || ""
    };

    fetch("https://script.google.com/macros/s/AKfycbzHLwOjhVzobZFSdCQgqwA4wUhtmQx7A1IazE68X_Ha7PLptniscj0P0vFXSg10CR4/exec", {

    method: "POST",

    headers: {
        "Content-Type": "text/plain;charset=utf-8"
    },

    body: JSON.stringify(payload)

})

.then(res => res.text())

.then(text => {

    console.log("SERVER RESPONSE:", text);

    let res;

    try{

        res = JSON.parse(text);

    }catch(err){

        alert("Server returned invalid response");

        btn.disabled = false;
        btn.innerText = "I Have Paid";

        return;
    }

    let id =
        res.orderId ||
        res.bookingId ||
        "N/A";

    alert("Order Confirmed! ID: " + id);

    /* DIGITAL PRODUCT HANDLING */

    if(type === "product" && payload.digital){

        localStorage.setItem(
            "download_file",
            payload.file
        );

        setTimeout(()=>{

            window.location.href =
                "download.html";

        },1000);

        return;
    }

    setTimeout(()=>{

        localStorage.clear();

        window.location.href =
            "index.html";

    },1000);

})

.catch(err => {

    console.log("PAYMENT ERROR:", err);

    alert("Payment failed");

    btn.disabled = false;

    btn.innerText = "I Have Paid";

});
}

</script>

</body>
</html>
