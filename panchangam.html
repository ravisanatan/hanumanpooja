<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Today's Telugu Panchangam</title>

<style>

body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#fff5e6;
    text-align:center;
}

/* HEADER */

header{
    background:#ff6600;
    color:white;
    padding:12px;
}

.header-content{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:15px;
    flex-wrap:wrap;
}

.logo{
    width:100px;
    height:100px;
    border-radius:50%;
    background:white;
    padding:6px;
}

.title-main{
    font-size:32px;
    font-weight:bold;
    margin:0;
}

.title-sub{
    font-size:16px;
    margin-top:5px;
}

/* PAGE */

.container{
    padding:15px;
}

.page-title{
    color:#8B0000;
    font-size:30px;
    margin-top:20px;
}

.today-date{
    font-size:18px;
    margin-top:10px;
    color:#444;
}

/* CARD */

.card{
    background:white;
    margin:20px auto;
    padding:20px;
    border-radius:12px;
    max-width:1000px;
    box-shadow:0 0 10px rgba(0,0,0,0.12);
}

/* GRID */

.grid{
    display:grid;
    grid-template-columns:
    repeat(auto-fit,minmax(220px,1fr));
    gap:15px;
}

.item{
    background:#fff4e8;
    padding:15px;
    border-radius:10px;
}

.label{
    font-weight:bold;
    color:#8B0000;
    display:block;
    margin-bottom:6px;
}

.value{
    font-size:18px;
}

/* LOADING */

.loading{
    font-size:20px;
    margin-top:40px;
}

.error{
    color:red;
    margin-top:20px;
}

</style>

</head>

<body>

<header>

<div class="header-content">

<img src="icon.jpeg" class="logo">

<div>
<p class="title-main">
PENDYALA
</p>
<p class="title-sub">
DIVINE SERVICES
</p>
</div>

</div>

</header>

<div class="container">

<h1 class="page-title">
🕉 Today's Telugu Panchangam
</h1>

<div class="today-date"
id="todayDate">
</div>

<div id="loading"
class="loading">
Loading Panchangam...
</div>

<div id="error"
class="error"></div>

<div id="content"
style="display:none;">

<div class="card">

<h2>Calendar</h2>

<div class="grid">

<div class="item">
<span class="label">Year</span>
<span class="value" id="year"></span>
</div>

<div class="item">
<span class="label">Ayanam</span>
<span class="value" id="ayanam"></span>
</div>

<div class="item">
<span class="label">Rutu</span>
<span class="value" id="ritu"></span>
</div>

<div class="item">
<span class="label">Month</span>
<span class="value" id="month"></span>
</div>

<div class="item">
<span class="label">Paksham</span>
<span class="value" id="paksham"></span>
</div>

<div class="item">
<span class="label">Vaaram</span>
<span class="value" id="vaaram"></span>
</div>

</div>

</div>

<div class="card">

<h2>Daily Panchangam</h2>

<div class="grid">

<div class="item">
<span class="label">Tithi</span>
<span class="value" id="tithi"></span>
</div>

<div class="item">
<span class="label">Nakshatra</span>
<span class="value" id="nakshatra"></span>
</div>

<div class="item">
<span class="label">Yogam</span>
<span class="value" id="yogam"></span>
</div>

<div class="item">
<span class="label">Karanam</span>
<span class="value" id="karanam"></span>
</div>

</div>

</div>

<div class="card">

<h2>Timings</h2>

<div class="grid">

<div class="item">
<span class="label">Rahukalam</span>
<span class="value" id="rahukalam"></span>
</div>

<div class="item">
<span class="label">Yamagandam</span>
<span class="value" id="yamagandam"></span>
</div>

<div class="item">
<span class="label">Gulika</span>
<span class="value" id="gulika"></span>
</div>

<div class="item">
<span class="label">Varjyam</span>
<span class="value" id="varjyam"></span>
</div>

<div class="item">
<span class="label">Amrita</span>
<span class="value" id="amrita"></span>
</div>

<div class="item">
<span class="label">Durmuhurtham</span>
<span class="value" id="durmuhurtham"></span>
</div>

</div>

</div>

</div>

</div>

<script>

// YOUR APPS SCRIPT URL
const API_URL =
"https://script.google.com/macros/s/AKfycbzwBsayIN21y1onJCcKSVdDd1F0PNNv08-WK12QUcsOQcgh2uQQb6nhGqGNt9jlbpv8/exec";

// DATE

const now = new Date();

document.getElementById("todayDate")
.innerText =
now.toDateString();

// LOAD DATA

async function loadPanchangam(){

    try{

        const res =
        await fetch(API_URL);

        const data =
        await res.json();

        console.log(data);

        // FILL DATA

        document.getElementById("year")
        .innerText = data.year;

        document.getElementById("ayanam")
        .innerText = data.ayanam;

        document.getElementById("ritu")
        .innerText = data.ritu;

        document.getElementById("month")
        .innerText = data.month;

        document.getElementById("paksham")
        .innerText = data.paksham;

        document.getElementById("vaaram")
        .innerText = data.vaaram;

        document.getElementById("tithi")
        .innerText = data.tithi;

        document.getElementById("nakshatra")
        .innerText = data.nakshatra;

        document.getElementById("yogam")
        .innerText = data.yogam;

        document.getElementById("karanam")
        .innerText = data.karanam;

        document.getElementById("rahukalam")
        .innerText = data.rahukalam;

        document.getElementById("yamagandam")
        .innerText = data.yamagandam;

        document.getElementById("gulika")
        .innerText = data.gulika;

        document.getElementById("varjyam")
        .innerText = data.varjyam;

        document.getElementById("amrita")
        .innerText = data.amrita;

        document.getElementById("durmuhurtham")
        .innerText = data.durmuhurtham;

        // SHOW

        document.getElementById("loading")
        .style.display = "none";

        document.getElementById("content")
        .style.display = "block";

    }catch(err){

        console.log(err);

        document.getElementById("loading")
        .style.display = "none";

        document.getElementById("error")
        .innerText =
        "Failed to load Panchangam";
    }
}

loadPanchangam();

</script>

</body>
</html>
