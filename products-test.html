<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PENDYALA DIVINE SERVICES</title>

<style>

html{
    scroll-behavior:smooth;
}

body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#fff5e6;
    text-align:center;
}

/* HEADER */
header{
    background:#ff6600;
    color:white;
    padding:12px;
}

.header-content{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:15px;
    flex-wrap:wrap;
}

.logo{
    width:110px;
    height:110px;
    border-radius:50%;
    background:white;
    padding:6px;
}

.title-main{
    font-size:36px;
    font-weight:bold;
    margin:0;
}

.title-sub{
    font-size:18px;
    margin-top:5px;
}

/* MENU */
.menu{
    background:white;
    padding:10px;
    box-shadow:0 2px 8px rgba(0,0,0,0.08);
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:10px;
}

.menu a{
    text-decoration:none;
    color:#ff6600;
    font-weight:bold;
    font-size:15px;
    padding:6px 10px;
    border-radius:6px;
}

@media (max-width:600px){

    .menu{
        justify-content:space-around;
    }

    .menu a{
        font-size:13px;
        padding:6px 8px;
    }
}

/* CONTAINER */

.container{
    padding:20px;
}

#searchBox{
    padding:10px;
    width:90%;
    max-width:400px;
    border-radius:8px;
    border:1px solid #ccc;
    margin-bottom:20px;
}

.section-title{
    color:#8B0000;
    font-size:24px;
    margin-bottom:20px;
}

/* PRODUCTS GRID */

.products{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:15px;
    max-width:1200px;
    margin:auto;
}

@media(max-width:900px){

    .products{
        grid-template-columns:repeat(3,1fr);
    }
}

@media(max-width:600px){

    .products{
        grid-template-columns:repeat(2,1fr);
        gap:10px;
    }
}

/* CARD */

.card{
    background:white;
    border-radius:12px;
    padding:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.10);
}

/* IMAGE */

.card img{
    width:100%;
    aspect-ratio:1/1;
    object-fit:cover;
    border-radius:8px;
}

/* TEXT */

.card h3{
    font-size:14px;
    margin:10px 0 5px;
    min-height:36px;
}

.desc{
    font-size:12px;
    color:#444;
    min-height:34px;
}

.price{
    color:#cc0000;
    font-size:18px;
    font-weight:bold;
    margin-top:8px;
}

/* BUTTON */

.btn{
    background:#ff6600;
    color:white;
    padding:8px;
    border-radius:6px;
    text-decoration:none;
    display:block;
    margin:10px auto 0;
    border:none;
    cursor:pointer;
    font-size:13px;
    width:90%;
    text-align:center;
}

.btn:hover{
    background:#e65c00;
}

</style>
</head>

<body>

<header>

<div class="header-content">

<img src="icon.jpeg" class="logo">

<div>

<p class="title-main">PENDYALA</p>

<p class="title-sub">DIVINE SERVICES</p>

</div>
</div>
</header>

<div class="menu">

<a href="index.html">Poojas</a>

<a href="astrology.html">Astrology</a>

<a href="muhurthas.html">Muhurthas</a>

<a href="products.html">Products</a>

<a href="learnings.html">Learnings</a>

</div>

<div class="container">

<input
type="text"
id="searchBox"
placeholder="Search products..."
>

<h2 class="section-title">
Spiritual Products
</h2>

<!-- DYNAMIC PRODUCTS -->

<div
class="products"
id="productsContainer">
</div>

</div>

<script>

/* =========================
   GOOGLE APPS SCRIPT API
========================= */

const API = "https://script.google.com/macros/s/AKfycbzHLwOjhVzobZFSdCQgqwA4wUhtmQx7A1IazE68X_Ha7PLptniscj0P0vFXSg10CR4/exec?action=getProducts";

/* =========================
   LOAD PRODUCTS
========================= */

fetch(API)

.then(response => response.json())

.then(data => {

    const container =
        document.getElementById(
            "productsContainer"
        );

    container.innerHTML = "";

    data.forEach(product => {

        // SHOW ONLY ACTIVE PRODUCTS

        if(
            product.active != true &&
            product.active != "TRUE"
        ){
            return;
        }

        container.innerHTML += `

        <div class="card">

            <img
            src="${product.image1}"
            alt="${product.name}"
            >

            <h3>
            ${product.name}
            </h3>

            <p class="desc">
            ${product.desc}
            </p>

            <div class="price">
            ₹${product.price}
            </div>

            <button class="btn">
            Buy Now
            </button>

        </div>

        `;
    });

})

.catch(error => {

    console.error(error);

    document.getElementById(
        "productsContainer"
    ).innerHTML =

    "<p>Failed to load products</p>";
});

/* =========================
   SEARCH
========================= */

document
.getElementById("searchBox")

.addEventListener("keyup", function(){

    let filter =
        this.value.toLowerCase();

    document
    .querySelectorAll(".card")

    .forEach(card => {

        card.style.display =

        card.innerText
        .toLowerCase()
        .includes(filter)

        ? "block"
        : "none";

    });
});

</script>

</body>
</html>
