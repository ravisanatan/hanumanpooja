<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PENDYALA DIVINE SERVICES</title>

<style>
html{scroll-behavior:smooth;}
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#fff5e6;
    text-align:center;
}

/* HEADER */
header{
    background:#ff6600;
    color:white;
    padding:12px;
}
.header-content{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:15px;
    flex-wrap:wrap;
}
.logo{
    width:110px;height:110px;border-radius:50%;
    background:white;padding:6px;
}
.title-main{font-size:36px;font-weight:bold;margin:0;}
.title-sub{font-size:18px;margin-top:5px;}

/* MENU */
.menu{
    background:white;
    padding:10px;
    box-shadow:0 2px 8px rgba(0,0,0,0.08);
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:10px;
}
.menu a{
    text-decoration:none;
    color:#ff6600;
    font-weight:bold;
    font-size:15px;
    padding:6px 10px;
    border-radius:6px;
}

/* GRID */
.container{padding:20px;}
#searchBox{
    padding:10px;width:90%;max-width:400px;
    border-radius:8px;border:1px solid #ccc;
    margin-bottom:20px;
}
.section-title{
    color:#8B0000;
    font-size:24px;
    margin-bottom:20px;
}

.products{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:15px;
    max-width:1200px;
    margin:auto;
}
@media(max-width:900px){.products{grid-template-columns:repeat(3,1fr);}}
@media(max-width:600px){.products{grid-template-columns:repeat(2,1fr);}}

/* CARD */
.card{
    background:white;
    border-radius:12px;
    padding:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.10);
}

.card img{
    width:100%;
    aspect-ratio:1/1;
    object-fit:cover;
    border-radius:8px;
}

.card h3{
    font-size:14px;
    margin:10px 0 5px;
    min-height:36px;
}

.desc{
    font-size:12px;
    color:#444;
    min-height:34px;
}

.price{
    color:#cc0000;
    font-size:18px;
    font-weight:bold;
    margin-top:8px;
}

.btn{
    background:#ff6600;
    color:white;
    padding:8px;
    border-radius:6px;
    border:none;
    cursor:pointer;
    font-size:13px;
    width:90%;
    margin-top:8px;
}

.btn:hover{background:#e65c00;}

.qty-box{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:10px;
    margin-top:10px;
}
.qty-box button{
    width:28px;height:28px;
    border:none;
    background:#ff6600;
    color:white;
    border-radius:4px;
    cursor:pointer;
}
</style>
</head>

<body>

<header>
<div class="header-content">
<img src="icon.jpeg" class="logo">
<div>
<p class="title-main">PENDYALA</p>
<p class="title-sub">DIVINE SERVICES</p>
</div>
</div>
</header>

<div class="menu">
<a href="index.html">Poojas</a>
<a href="astrology.html">Astrology</a>
<a href="muhurthas.html">Muhurthas</a>
<a href="products.html">Products</a>
<a href="learnings.html">Learnings</a>
</div>

<div class="container">

<input id="searchBox" placeholder="Search products...">
<h2 class="section-title">Spiritual Products</h2>

<div class="products" id="productsContainer"></div>

</div>

<script>

const API = "https://script.google.com/macros/s/AKfycbzHLwOjhVzobZFSdCQgqwA4wUhtmQx7A1IazE68X_Ha7PLptniscj0P0vFXSg10CR4/exec?action=getProducts";

/* SAFE STRING */
function esc(str){
    return (str || "").toString().replace(/'/g,"\\'");
}

/* LOAD */
fetch(API)
.then(r=>r.json())
.then(data=>{

    let container = document.getElementById("productsContainer");
    container.innerHTML = "";

    data.forEach(p=>{

        if(!(p.active === true || p.active === "TRUE")) return;

        container.innerHTML += `
        <div class="card">

            <img src="${p.image1}" onerror="this.src='icon.jpeg'">

            <h3>${p.name}</h3>

            <p class="desc">${p.desc}</p>

            <div class="price">₹${p.price}</div>

            <div class="qty-box">
                <button onclick="changeQty(this,-1)">-</button>
                <span class="qty">1</span>
                <button onclick="changeQty(this,1)">+</button>
            </div>

            <button class="btn"
            onclick="openDetails('${esc(p.name)}','${p.price}','${esc(p.desc)}','${p.image1}')">
            View Details
            </button>

            <button class="btn"
            onclick="buyNow('${esc(p.name)}',${p.price},this)">
            Buy Now
            </button>

        </div>`;
    });

})
.catch(err=>{
    console.log(err);
    document.getElementById("productsContainer").innerHTML =
    "<p>Failed to load products</p>";
});

/* QTY */
function changeQty(btn,change){
    let el = btn.parentElement.querySelector(".qty");
    let qty = parseInt(el.innerText);
    el.innerText = Math.max(1, qty + change);
}

/* DETAILS */
function openDetails(name,price,desc,image){
    alert(
        name +
        "\n\n₹" + price +
        "\n\n" + desc
    );
}

/* BUY */
function buyNow(name,price,btn){

    let card = btn.closest(".card");
    let qty = parseInt(card.querySelector(".qty").innerText);

    let total = price * qty;

    alert(
        "Product: " + name +
        "\nQty: " + qty +
        "\nTotal: ₹" + total
    );

    // later redirect to payment
}

</script>

</body>
</html>
