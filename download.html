<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Download Your File</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#fff5e6;
    text-align:center;
    padding:30px;
}

.box{
    background:white;
    max-width:420px;
    margin:auto;
    padding:25px;
    border-radius:12px;
    box-shadow:0 0 10px rgba(0,0,0,0.12);
}

h2{
    color:#8B0000;
    margin-bottom:10px;
}

p{
    color:#444;
    font-size:14px;
}

.product{
    font-size:18px;
    font-weight:bold;
    margin:15px 0;
    color:#333;
}

button{
    width:100%;
    padding:14px;
    background:#ff6600;
    color:white;
    border:none;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
    margin-top:15px;
}

button:hover{
    background:#e65c00;
}

.note{
    font-size:12px;
    color:#777;
    margin-top:10px;
}
</style>
</head>

<body>

<div class="box">

<h2>🎉 Payment Successful</h2>

<p>Your digital product is ready</p>

<div class="product" id="productName">Loading...</div>

<button onclick="downloadFile()">Download Now</button>

<p class="note">If download does not start, check your browser settings.</p>

</div>

<script>

// ================= LOAD DATA =================
let product = localStorage.getItem("temp_product");
let file = localStorage.getItem("temp_file");
let isDigital = localStorage.getItem("temp_digital");

// Show product name
document.getElementById("productName").innerText = product || "Your File";

// ================= VALIDATION =================
if(isDigital !== "true" || !file){
    document.body.innerHTML = `
        <div class="box">
            <h2>❌ No Download Available</h2>
            <p>This page is only for digital purchases.</p>
        </div>
    `;
}

// ================= DOWNLOAD =================
function downloadFile(){

    if(!file){
        alert("File not found");
        return;
    }

    let link = document.createElement("a");
    link.href = file;

    // force download
    link.download = file.split("/").pop();

    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
}

</script>

</body>
</html>
